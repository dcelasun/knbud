name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release_please
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os-name: linux
            arch-name: x86_64
          - goos: linux
            goarch: arm64
            os-name: linux
            arch-name: arm64
          - goos: darwin
            goarch: amd64
            os-name: macos
            arch-name: x86_64
          - goos: darwin
            goarch: arm64
            os-name: macos
            arch-name: arm64
          - goos: windows
            goarch: amd64
            os-name: windows
            arch-name: x86_64
          - goos: windows
            goarch: arm64
            os-name: windows
            arch-name: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          binary=knbud
          if [ "$GOOS" = windows ]; then binary=knbud.exe; fi
          archive="knbud_${TAG_NAME}_${{ matrix.os-name }}_${{ matrix.arch-name }}"
          mkdir -p dist/package
          go build -trimpath -ldflags="-s -w" -o "dist/package/$binary" ./cmd/knbud
          if [ "$GOOS" = windows ]; then
            cd dist/package
            zip "../$archive.zip" "$binary"
          else
            tar -C dist/package -czf "dist/$archive.tar.gz" "$binary"
          fi
      - name: Upload archive
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/*
